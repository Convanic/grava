name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: gravelexplorer_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - uses: actions/checkout@v4

      - name: PHP einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, gd, mbstring, openssl, json
          coverage: none

      - name: Composer-Cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Abhängigkeiten installieren
        run: composer install --no-interaction --prefer-dist

      - name: Test-.env schreiben
        run: |
          cat > .env <<'EOF'
          APP_ENV=testing
          APP_URL=http://localhost
          # Fester Test-Key (Base64 von 32 Nullbytes) — NUR für CI/Tests.
          APP_KEY=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_NAME=gravelexplorer_test
          DB_USER=root
          DB_PASS=root
          DB_SOCKET=
          MAIL_HOST=
          STRAVA_FAKE=1
          EOF

      - name: Auf MySQL warten
        run: |
          for i in $(seq 1 30); do
            mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -proot --silent && break
            sleep 2
          done

      - name: Tests
        run: ./vendor/bin/phpunit --display-deprecations
