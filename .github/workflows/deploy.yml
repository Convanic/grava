name: Deploy (SFTP)

# Baut die Composer-Abhängigkeiten in der CI (der Server kann kein composer)
# und lädt das fertige Projekt per SFTP (Port 22) auf grava.world hoch.
#
# Auslöser:
#   - automatisch bei Push auf main
#   - manuell über den "Run workflow"-Button (Actions-Tab)
on:
  push:
    branches: [main]
  workflow_dispatch:

# Verhindert, dass sich zwei Deploys überlappen.
concurrency:
  group: sftp-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: PHP einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, gd, mbstring, openssl, json
          coverage: none

      - name: Composer-Abhängigkeiten (ohne dev) installieren
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      # Sauberes Deploy-Paket bauen: nur das, was auf den Server soll.
      # Schützt die Server-.env und die Nutzerdaten in storage/, weil diese
      # gar nicht erst im Paket landen.
      - name: Deploy-Paket zusammenstellen
        run: |
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='tests' \
            --exclude='docker' \
            --exclude='docs' \
            --exclude='.DS_Store' \
            --exclude='.phpunit.cache' \
            --exclude='.phpunit.result.cache' \
            --exclude='phpunit.xml.dist' \
            --exclude='.env' \
            --exclude='.env.example' \
            --exclude='storage' \
            --exclude='__deploy' \
            ./ __deploy/

      - name: SFTP-Upload
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          # Inhalt des Deploy-Pakets …
          local_path: './__deploy/*'
          # … in das Zielverzeichnis auf dem Server (muss bereits existieren,
          # da sftp_only es nicht automatisch anlegt). Mit / am Ende.
          remote_path: ${{ secrets.FTP_SERVER_DIR }}
          # Reines SFTP (kein rsync/Shell auf dem Server nötig).
          sftp_only: true
          # NIEMALS auf true setzen: würde Server-.env + storage/ löschen!
          delete_remote_files: false
