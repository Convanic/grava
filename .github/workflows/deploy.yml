name: Deploy (FTP)

# Baut die Composer-Abhängigkeiten in der CI (der Server kann kein composer)
# und lädt das fertige Projekt per FTP auf grava.world hoch.
#
# Auslöser:
#   - automatisch bei Push auf main
#   - manuell über den "Run workflow"-Button (Actions-Tab)
on:
  push:
    branches: [main]
  workflow_dispatch:

# Verhindert, dass sich zwei Deploys überlappen (zweiter wartet bzw. ersetzt).
concurrency:
  group: ftp-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: PHP einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, gd, mbstring, openssl, json
          coverage: none

      - name: Composer-Abhängigkeiten (ohne dev) installieren
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: FTP-Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # FTP über TLS, wenn der Hoster es unterstützt. Falls der Connect
          # scheitert, auf "ftp" (Klartext) wechseln.
          protocol: ftps
          port: 21
          # Lokal: das gesamte Projekt-Root.
          local-dir: ./
          # Remote: das Zielverzeichnis auf dem Server. Muss mit / enden.
          # Hier landet das komplette Projekt; der DocumentRoot der Domain
          # zeigt anschließend auf <server-dir>/public.
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # Was NICHT hochgeladen wird. Schützt v. a. die Server-.env und die
          # Nutzerdaten in storage/ vor dem differenziellen Sync.
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/tests/**
            **/docker/**
            **/docs/**
            **/.DS_Store
            **/.phpunit.cache/**
            .phpunit.result.cache
            phpunit.xml.dist
            .env
            .env.example
            storage/logs/**
            storage/mail/**
            storage/routes/**
            storage/avatars/**
